services:
  - type: web
    name: establo-horizonte-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_POOL_MAX_SIZE
        value: 5
      - key: DB_POOL_MIN_IDLE
        value: 0
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: STORAGE_PROVIDER
        value: local
      - key: MAIL_MODE
        value: log
