services:
  - type: web
    name: establo-horizonte-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_POOL_MAX_SIZE
        value: 5
      - key: DB_POOL_MIN_IDLE
        value: 0
      - key: APP_SEED_ENABLED
        value: false
      - key: SPRING_MAIN_LAZY_INITIALIZATION
        value: true
      - key: SPRING_DATA_JPA_REPOSITORIES_BOOTSTRAP_MODE
        value: lazy
      - key: JAVA_TOOL_OPTIONS
        value: -XX:MaxRAMPercentage=70 -XX:+UseSerialGC -XX:TieredStopAtLevel=1
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://establo-horizonte-web.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://establo-horizonte-web.onrender.com,http://localhost:5173,http://localhost:8088
      - key: STORAGE_PROVIDER
        value: local
      - key: MAIL_MODE
        value: smtp
      - key: MAIL_FROM
        value: caballerizaestablo@gmail.com
      - key: SPRING_MAIL_HOST
        value: smtp-relay.brevo.com
      - key: SPRING_MAIL_PORT
        value: 2525
      - key: SPRING_MAIL_USERNAME
        value: afc14a001@smtp-brevo.com
      - key: SPRING_MAIL_PASSWORD
        sync: false

  - type: web
    name: establo-horizonte-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://establo-horizonte-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
