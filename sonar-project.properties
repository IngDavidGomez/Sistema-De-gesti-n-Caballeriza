sonar.projectKey=establo-horizonte
sonar.projectName=Establo Horizonte
sonar.projectVersion=1.0.0
sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java,frontend/src
sonar.test.inclusions=backend/src/test/**/*.java,frontend/src/**/*.test.jsx
sonar.exclusions=backend/src/test/**,frontend/src/**/*.test.jsx,frontend/coverage/**,frontend/dist/**,**/node_modules/**,**/target/**

sonar.java.source=21
sonar.java.binaries=backend/target/classes
sonar.java.test.binaries=backend/target/test-classes
sonar.java.libraries=backend/target/dependency/*.jar
sonar.java.test.libraries=backend/target/dependency/*.jar
sonar.junit.reportPaths=backend/target/surefire-reports

sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.coverage.exclusions=backend/src/main/java/com/establo/EstabloApplication.java,backend/src/main/java/com/establo/config/**,backend/src/main/java/db/migration/**,frontend/src/main.jsx
