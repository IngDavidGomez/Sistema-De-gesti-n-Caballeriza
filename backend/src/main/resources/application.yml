spring:
  application.name: establo-api
  datasource:
    url: jdbc:h2:file:./data/establo;MODE=PostgreSQL;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate.ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
  h2.console.enabled: true
  servlet.multipart:
    max-file-size: 5MB
    max-request-size: 6MB
  mail:
    properties:
      mail.smtp.auth: ${SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${SMTP_STARTTLS:true}
      mail.smtp.connectiontimeout: ${SMTP_CONNECTION_TIMEOUT:10000}
      mail.smtp.timeout: ${SMTP_TIMEOUT:10000}
      mail.smtp.writetimeout: ${SMTP_WRITE_TIMEOUT:10000}
server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
app:
  seed.enabled: ${APP_SEED_ENABLED:true}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  cors.allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  storage:
    provider: ${STORAGE_PROVIDER:local}
    local-dir: ${UPLOAD_DIR:uploads/horses}
    public-base-url: ${STORAGE_PUBLIC_URL:}
    s3:
      bucket: ${S3_BUCKET:}
      region: ${S3_REGION:us-east-1}
      endpoint: ${S3_ENDPOINT:}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
  mail:
    mode: ${MAIL_MODE:log}
    from: ${MAIL_FROM:no-reply@establo.local}
  jwt:
    secret: ${JWT_SECRET:UnaClaveLocalSeguraParaEstabloDeAlMenos32Caracteres2026}
    expiration: 86400000
springdoc.swagger-ui.path: /swagger-ui.html
---
spring:
  config.activate.on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/establo}
    username: ${DB_USER:establo}
    password: ${DB_PASSWORD:establo}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:0}
      connection-timeout: 30000
      validation-timeout: 5000
      keepalive-time: 120000
  jpa.hibernate.ddl-auto: validate
  h2.console.enabled: false
management:
  endpoints.web.exposure.include: health,info
  endpoint.health:
    show-details: never
    probes.enabled: true
  health.mail.enabled: ${MAIL_HEALTH_ENABLED:false}
