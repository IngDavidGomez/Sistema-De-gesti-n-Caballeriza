server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  location /api/ { proxy_pass http://backend:8080/api/; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
  location /uploads/ { proxy_pass http://backend:8080/uploads/; }
  location /demo-horses/ { proxy_pass http://backend:8080/demo-horses/; }
  location / { try_files $uri /index.html; }
}
