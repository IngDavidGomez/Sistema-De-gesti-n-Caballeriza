services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-establo}
      POSTGRES_USER: ${DB_USER:-establo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-establo}
    volumes:
      - establo_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-establo} -d ${DB_NAME:-establo}"]
      interval: 5s
      timeout: 3s
      retries: 12
  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-establo}
      DB_USER: ${DB_USER:-establo}
      DB_PASSWORD: ${DB_PASSWORD:-establo}
      JWT_SECRET: ${JWT_SECRET:-CambieEstaClaveJWTAntesDeProduccion1234567890}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8088}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8088}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      UPLOAD_DIR: /app/uploads/horses
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      MAIL_MODE: ${MAIL_MODE:-log}
      MAIL_FROM: ${MAIL_FROM:-no-reply@establo.local}
      SPRING_MAIL_HOST: ${SMTP_HOST:-localhost}
      SPRING_MAIL_PORT: ${SMTP_PORT:-587}
      SPRING_MAIL_USERNAME: ${SMTP_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SMTP_PASSWORD:-}
    volumes:
      - horse_uploads:/app/uploads
    depends_on:
      postgres: { condition: service_healthy }
  frontend:
    build: ./frontend
    ports:
      - "${APP_PORT:-8088}:80"
    depends_on:
      - backend
  sonardb:
    image: postgres:16-alpine
    profiles: ["quality"]
    environment:
      POSTGRES_DB: ${SONAR_DB_NAME:-sonar}
      POSTGRES_USER: ${SONAR_DB_USER:-sonar}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:-sonar_local_change_me}
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONAR_DB_USER:-sonar} -d ${SONAR_DB_NAME:-sonar}"]
      interval: 10s
      timeout: 5s
      retries: 12
  sonarqube:
    image: sonarqube:community
    profiles: ["quality"]
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonardb:5432/${SONAR_DB_NAME:-sonar}
      SONAR_JDBC_USERNAME: ${SONAR_DB_USER:-sonar}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:-sonar_local_change_me}
    ports:
      - "${SONAR_PORT:-9000}:9000"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs
    depends_on:
      sonardb: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 90s
  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:latest
    profiles: ["scan"]
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN:-}
    volumes:
      - ./:/usr/src
    depends_on:
      sonarqube: { condition: service_healthy }
volumes:
  establo_data:
  horse_uploads:
  sonar_db_data:
  sonar_data:
  sonar_extensions:
  sonar_logs:
